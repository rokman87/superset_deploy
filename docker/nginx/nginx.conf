events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream для Superset приложения
    upstream superset_app {
        server superset:8088;
    }

    # Upstream для WebSocket сервера
    upstream websocket_server {
        server superset-websocket:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Основные заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket endpoint - ЭТО ВАЖНО!
        location /ws {
            proxy_pass http://websocket_server/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Важно для WebSocket
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Все остальные запросы идут в Superset
        location / {
            proxy_pass http://superset_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}