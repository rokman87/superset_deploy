x-superset-image: &superset-image custom_superset:0.3.5
x-superset-volumes:
  &superset-volumes # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./docker:/app/docker
  - superset_home:/app/superset_home

services:
  redis:
    image: redis:7
    container_name: superset_cache
    restart: unless-stopped
    volumes:
      - redis:/data

  db:
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    image: postgres:16
    container_name: superset_db
    restart: unless-stopped
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  superset:
    env_file:
      - path: docker/.env # default
        required: true
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      FEATURE_FLAGS_GLOBAL_ASYNC_QUERIES: ${FEATURE_FLAGS_GLOBAL_ASYNC_QUERIES:-false}
      GLOBAL_ASYNC_QUERIES_TRANSPORT: ${GLOBAL_ASYNC_QUERIES_TRANSPORT:-polling}
      GLOBAL_ASYNC_QUERIES_WEBSOCKET_URL: ${GLOBAL_ASYNC_QUERIES_WEBSOCKET_URL:-ws://localhost:8080/ws}
      GLOBAL_ASYNC_QUERIES_JWT_SECRET: ${GLOBAL_ASYNC_QUERIES_JWT_SECRET:-CHANGE_ME_TO_A_COMPLEX_SECRET_AT_LEAST_32_CHARS}
      REDIS_WEBSOCKET_DB: ${REDIS_WEBSOCKET_DB:-2}
    image: *superset-image
    container_name: superset_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    user: "root"
    restart: unless-stopped
    ports:
      - 8088:8088
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes

  superset-init:
    image: *superset-image
    container_name: superset_init
    command: ["/app/docker/docker-init.sh"]
    env_file:
      - path: docker/.env
        required: true
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    user: "root"
    volumes: *superset-volumes
    healthcheck:
      disable: true

  superset-worker:
    image: *superset-image
    container_name: superset_worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    environment:
      FEATURE_FLAGS_GLOBAL_ASYNC_QUERIES: ${FEATURE_FLAGS_GLOBAL_ASYNC_QUERIES:-false}
      GLOBAL_ASYNC_QUERIES_TRANSPORT: ${GLOBAL_ASYNC_QUERIES_TRANSPORT:-polling}
      GLOBAL_ASYNC_QUERIES_WEBSOCKET_URL: ${GLOBAL_ASYNC_QUERIES_WEBSOCKET_URL:-ws://localhost:8080/ws}
      GLOBAL_ASYNC_QUERIES_JWT_SECRET: ${GLOBAL_ASYNC_QUERIES_JWT_SECRET:-CHANGE_ME_TO_A_COMPLEX_SECRET_AT_LEAST_32_CHARS}
      REDIS_WEBSOCKET_DB: ${REDIS_WEBSOCKET_DB:-2}
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    user: "root"
    volumes: *superset-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]

  superset-worker-beat:
    image: *superset-image
    container_name: superset_worker_beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    env_file:
      - path: docker/.env # default
        required: true
      - path: docker/.env-local # optional override
        required: false
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    user: "root"
    volumes: *superset-volumes
    healthcheck:
      disable: true

volumes:
  superset_home:
    external: false
  db_home:
    external: false
  redis:
    external: false
